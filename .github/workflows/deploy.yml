name: Deploy

# === 前置准备 (只需做一次) ===
#
# 进入: Settings → Secrets and variables → Actions
# 页面顶部两个标签页，分别配置:
#
# 【Secrets 标签 → New repository secret】
#   CLOUDFLARE_API_TOKEN   — Cloudflare API Token (Email Routing + Workers + D1 权限)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare Account ID
#   AUTH_PASSWORD          — 登录密码
#   AUTH_SECRET            — HMAC 签名密钥
#
# 【Variables 标签 → New repository variable】
#   D1_DATABASE_ID         — D1 UUID (npx wrangler d1 create edge-mail-db 获取)
#   VITE_API_BASE          — Worker URL (如 https://edge-mail-worker.xxx.workers.dev)
#
# ⚠ 不要用 Environment secrets/variables，用 Repository 级别
#
# === 工作流触发后自动执行 ===
#     Worker: D1 迁移 → 部署 Worker → 注入 Secrets
#     Web:    构建 SPA   → 部署 Pages

on:
  push:
  workflow_dispatch:
    inputs:
      deploy-worker:
        description: '部署 Worker'
        type: boolean
        default: true
      deploy-web:
        description: '部署 Web'
        type: boolean
        default: true

jobs:
  # ── 测试：每次推送或部署前自动运行 ──
  test:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - uses: actions/checkout@v5

      # 安装 pnpm（与本地版本一致）
      - uses: pnpm/action-setup@v6
        with:
          version: 10

      # 安装 Node.js（启用 pnpm 缓存加速）
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      # 安装依赖
      - run: pnpm install

      # 运行 worker 测试套件 — 全部通过才能部署
      - name: Run worker tests
        working-directory: packages/worker
        run: npx vitest run

  # ── 校验：仅手动部署时检查密钥是否完整 ──
  validate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 检查所有必需的 Secrets 和 Variables 是否已设置，缺失则快速失败
      - name: Check required secrets & variables
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: .github/scripts/validate.sh

  # ── 部署 Worker：D1 迁移 + 注入 Secrets + wrangler deploy ──
  deploy-worker:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy-worker
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install

      # 将 wrangler.jsonc 中的占位符 database_id 替换为真实 UUID
      - name: Inject database_id
        run: node .github/scripts/inject-database-id.js
        env:
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}

      # 执行增量 SQL 迁移（逐号递增，不修改已 apply 的迁移）
      - name: Apply D1 migrations
        working-directory: packages/worker
        run: npx wrangler d1 migrations apply edge-mail-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 写入运行时 Secrets（AUTH_PASSWORD / AUTH_SECRET），用于 HMAC 认证
      - name: Set Worker secrets
        working-directory: packages/worker
        run: |
          printf '%s' "${{ secrets.AUTH_PASSWORD }}" | npx wrangler secret put AUTH_PASSWORD
          printf '%s' "${{ secrets.AUTH_SECRET }}"   | npx wrangler secret put AUTH_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 部署 Worker 到 Cloudflare 边缘网络
      - name: Deploy Worker
        working-directory: packages/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── 部署 Web：构建 Vue SPA → 发布到 Cloudflare Pages ──
  deploy-web:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy-web
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install

      # Vite 构建，VITE_API_BASE 指向已部署的 Worker URL
      - name: Build Web
        working-directory: packages/web
        run: npx vite build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      # 确保 Pages 项目已创建（已存在则跳过）
      - name: Ensure Pages project exists
        working-directory: packages/web
        run: npx wrangler pages project create edge-mail-web --production-branch=master || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 上传 dist/ 到 Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        working-directory: packages/web
        run: npx wrangler pages deploy dist --project-name=edge-mail-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
