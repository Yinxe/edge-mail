name: Deploy

# === 前置准备 (只需做一次) ===
#
# 进入: Settings → Secrets and variables → Actions
# 页面顶部两个标签页，分别配置:
#
# 【Secrets 标签 → New repository secret】
#   CLOUDFLARE_API_TOKEN   — Cloudflare API Token (Email Routing + Workers + D1 权限)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare Account ID
#   AUTH_PASSWORD          — 登录密码
#   AUTH_SECRET            — HMAC 签名密钥
#
# 【Variables 标签 → New repository variable】
#   D1_DATABASE_ID         — D1 UUID (npx wrangler d1 create edge-mail-db 获取)
#   VITE_API_BASE          — Worker URL (如 https://edge-mail-worker.xxx.workers.dev)
#   EMAIL_DOMAIN           — 域名，如 yourdomain.com (CI 自动检查并配置 Email Routing)
#
# ⚠ 不要用 Environment secrets/variables，用 Repository 级别
#
# 以及 Dashboard 操作：
#   Email Routing 规则: *@yourdomain.com → edge-mail-worker
#
# === 工作流触发后自动执行 ===
#     Worker: D1 迁移 → 部署 Worker → 注入 Secrets
#     Web:    构建 SPA   → 部署 Pages

on:
  workflow_dispatch:
    inputs:
      deploy-worker:
        description: '部署 Worker'
        type: boolean
        default: true
      deploy-web:
        description: '部署 Web'
        type: boolean
        default: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets & variables
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          EMAIL_DOMAIN: ${{ vars.EMAIL_DOMAIN }}
        run: |
          errors=0
          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID AUTH_PASSWORD AUTH_SECRET D1_DATABASE_ID VITE_API_BASE EMAIL_DOMAIN; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required: $var"
              errors=$((errors+1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors required secret(s)/variable(s) are missing. Check Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "✅ All required secrets and variables are configured"

  deploy-worker:
    if: inputs.deploy-worker
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install

      - name: Inject database_id
        run: |
          node -e "
            const fs = require('fs');
            const p = 'packages/worker/wrangler.jsonc';
            const raw = fs.readFileSync(p, 'utf8').replace(/\/\/.*$/gm, '');
            const c = JSON.parse(raw);
            c.d1_databases[0].database_id = '${{ vars.D1_DATABASE_ID }}';
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

      - name: Debug — verify injected wrangler.jsonc
        run: |
          echo "=== wrangler.jsonc after inject ==="
          cat packages/worker/wrangler.jsonc | head -20

      - name: Run D1 migrations
        working-directory: packages/worker
        run: npx wrangler d1 execute edge-mail-db --file=schema.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Configure Email Routing
        if: vars.EMAIL_DOMAIN
        working-directory: packages/worker
        run: |
          set -euo pipefail
          DOMAIN="${{ vars.EMAIL_DOMAIN }}"
          NEED_SETUP=false

          # 1. Check if Email Routing is enabled (DNS records exist)
          echo "🔍 Checking Email Routing status for $DOMAIN..."
          if npx wrangler email routing dns get "$DOMAIN" > /dev/null 2>&1; then
            echo "✅ Email Routing already enabled"
          else
            echo "⚠️  Email Routing not enabled, will configure..."
            NEED_SETUP=true
          fi

          # 2. Check if routing rule to worker exists
          echo "🔍 Checking routing rules..."
          if npx wrangler email routing rules list 2>&1 | grep -q "edge-mail-worker"; then
            echo "✅ Routing rule to edge-mail-worker already exists"
          else
            echo "⚠️  No routing rule to worker found, will create..."
            NEED_SETUP=true
          fi

          if [ "$NEED_SETUP" = false ]; then
            echo "✅ Email Routing fully configured, skipping setup"
            exit 0
          fi

          # 3. Enable routing if needed
          echo "🔧 Enabling Email Routing for $DOMAIN..."
          npx wrangler email routing enable "$DOMAIN"

          # 4. Create routing rule if needed
          echo "🔧 Creating routing rule *@$DOMAIN → edge-mail-worker..."
          npx wrangler email routing rules create "$DOMAIN" --action=worker --destination=edge-mail-worker

          echo "✅ Email Routing configured successfully"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        working-directory: packages/worker
        run: |
          printf '%s' "${{ secrets.AUTH_PASSWORD }}" | npx wrangler secret put AUTH_PASSWORD
          printf '%s' "${{ secrets.AUTH_SECRET }}"   | npx wrangler secret put AUTH_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        working-directory: packages/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-web:
    if: inputs.deploy-web
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install

      - name: Build Web
        working-directory: packages/web
        run: npx vite build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: Ensure Pages project exists
        working-directory: packages/web
        run: npx wrangler pages project create edge-mail-web --production-branch=master || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        working-directory: packages/web
        run: npx wrangler pages deploy dist --project-name=edge-mail-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
